name: CI
on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[all] pytest
      - name: Lint (syntax)
        run: python -m py_compile cpress/archive.py cpress/cli.py
      - name: Tests
        run: pytest -q

  bench-dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[all]
      - name: Dry-run bench
        run: |
          mkdir -p benchdata && echo "hello" > benchdata/file.txt
          python scripts/bench.py benchdata || true

  nightly-bench:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[all]
      - name: Bench vs 7z/zstd
        run: |
          mkdir -p benchdata && dd if=/dev/urandom bs=1M count=5 of=benchdata/random.bin
          python scripts/bench.py benchdata || true

  fuzz-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[all]
      - name: Fuzz archive parsing
        run: python scripts/fuzz.py --count 200
